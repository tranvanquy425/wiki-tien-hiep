name: Đồng bộ Wiki từ Drive

# Workflow TỰ kéo dữ liệu wiki mới từ Apps Script (Google Drive) rồi commit vào repo.
# Cloudflare Pages thấy commit -> tự deploy.
#
# QUAN TRỌNG: workflow KHÔNG đụng vào series_registry.json (file đó do người quản trị
# giữ, chứa tiến độ chương). Workflow chỉ cập nhật data/<slug>.json — phần nội dung hay đổi.

on:
  schedule:
    - cron: "0 */6 * * *"      # tự chạy mỗi 6 tiếng (UTC)
  workflow_dispatch:            # cho phép bấm tay "Run workflow"

permissions:
  contents: write

env:
  WIKI_SYNC_URL: "https://script.google.com/macros/s/AKfycbyzXMt5JHBTVeJLvBICosy9gvHeUwjZf0UwYHHKWcvNNtf-OGCs_vvpphT6ORVH04qW/exec"
  # Danh sách slug các bộ (cách nhau bởi dấu cách). Thêm bộ mới -> thêm slug vào đây.
  SLUGS: "tien-nghich"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code repo
        uses: actions/checkout@v4

      - name: Kéo dữ liệu wiki từng bộ
        run: |
          set -e
          mkdir -p data
          for slug in $SLUGS; do
            echo "== Bộ: $slug =="
            echo "  clearCache..."
            curl -sSL "${WIKI_SYNC_URL}?action=clearCache&series=${slug}" -o /dev/null || true
            echo "  download -> data/${slug}.json"
            curl -sSL "${WIKI_SYNC_URL}?action=download&series=${slug}" -o "data/${slug}.json.tmp"
            # Chỉ ghi đè nếu file tải về là JSON hợp lệ (tránh ghi đè bằng trang lỗi/login)
            if python3 -c "import json; json.load(open('data/${slug}.json.tmp',encoding='utf-8'))" 2>/dev/null; then
              mv "data/${slug}.json.tmp" "data/${slug}.json"
              echo "  OK: data/${slug}.json đã cập nhật"
            else
              echo "  !! Tải về KHÔNG phải JSON hợp lệ — giữ bản cũ, bỏ qua"
              rm -f "data/${slug}.json.tmp"
            fi
          done
          # Bản fallback cho tien-nghich (wiki.html thử thêm wiki_data.json ở gốc)
          if [ -f data/tien-nghich.json ]; then
            cp data/tien-nghich.json wiki_data.json
          fi
          echo "== Xong =="

      - name: Commit nếu có thay đổi
        run: |
          git config user.name "wiki-sync-bot"
          git config user.email "wiki-sync-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "Không có thay đổi — bỏ qua commit."
            exit 0
          fi
          git add -A
          git commit -m "Tự đồng bộ wiki từ Drive ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          # Thử push, nếu bị từ chối thì rebase lên bản mới nhất rồi push lại (tối đa 5 lần)
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Đã push -> Cloudflare Pages sẽ tự deploy."
              exit 0
            fi
            echo "Push bị từ chối (lần $i) — đồng bộ với remote rồi thử lại..."
            git fetch origin main
            git rebase origin/main || git rebase --abort
          done
          echo "Không push được sau 5 lần thử."
          exit 1
