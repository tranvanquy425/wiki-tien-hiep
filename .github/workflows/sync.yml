name: Đồng bộ Wiki từ Drive

# Workflow TỰ kéo dữ liệu wiki mới từ Apps Script (Google Drive) rồi commit vào repo.
# Cloudflare Pages thấy commit -> tự deploy.
#
# Workflow cập nhật:
#   - data/<slug>.json       (nội dung wiki từng bộ — phần hay đổi)
#   - series_registry.json   (danh sách bộ + tiến độ wikiToiChuong — lấy từ ?action=list)
#
# series_registry.json: lấy slug/ten/tienDo... từ ?action=list, nhưng GIỮ LẠI các field ID
# (wikiFolderId, readerJsonId, pdfFileId) từ bản registry cũ trong repo (khớp theo slug),
# vì ?action=list không trả các ID đó. Chỉ ghi đè khi list hợp lệ (có mảng "series" không rỗng).

on:
  schedule:
    - cron: "0 */6 * * *"      # tự chạy mỗi 6 tiếng (UTC)
  workflow_dispatch:            # cho phép bấm tay "Run workflow"

permissions:
  contents: write

env:
  WIKI_SYNC_URL: "https://script.google.com/macros/s/AKfycbyzXMt5JHBTVeJLvBICosy9gvHeUwjZf0UwYHHKWcvNNtf-OGCs_vvpphT6ORVH04qW/exec"
  # Danh sách slug các bộ (cách nhau bởi dấu cách). Thêm bộ mới -> thêm slug vào đây.
  SLUGS: "tien-nghich"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code repo
        uses: actions/checkout@v4

      - name: Kéo dữ liệu wiki từng bộ
        run: |
          set -e
          mkdir -p data
          for slug in $SLUGS; do
            echo "== Bộ: $slug =="
            echo "  clearCache..."
            curl -sSL "${WIKI_SYNC_URL}?action=clearCache&series=${slug}" -o /dev/null || true
            echo "  download -> data/${slug}.json"
            curl -sSL "${WIKI_SYNC_URL}?action=download&series=${slug}" -o "data/${slug}.json.tmp"
            # Chỉ ghi đè nếu file tải về là JSON hợp lệ (tránh ghi đè bằng trang lỗi/login)
            if python3 -c "import json; json.load(open('data/${slug}.json.tmp',encoding='utf-8'))" 2>/dev/null; then
              mv "data/${slug}.json.tmp" "data/${slug}.json"
              echo "  OK: data/${slug}.json đã cập nhật"
            else
              echo "  !! Tải về KHÔNG phải JSON hợp lệ — giữ bản cũ, bỏ qua"
              rm -f "data/${slug}.json.tmp"
            fi
          done
          # Bản fallback cho tien-nghich (wiki.html thử thêm wiki_data.json ở gốc)
          if [ -f data/tien-nghich.json ]; then
            cp data/tien-nghich.json wiki_data.json
          fi
          echo "== Xong dữ liệu wiki =="

      - name: Tạo script cập nhật registry
        run: |
          cat > update_registry.py <<'PY'
          import json, sys, os

          # 1) Đọc danh sách mới từ ?action=list (đã tải vào registry_remote.tmp)
          try:
              remote = json.load(open('registry_remote.tmp', encoding='utf-8'))
          except Exception as e:
              print("  !! list tra ve khong phai JSON hop le:", e)
              sys.exit(1)
          series = remote.get('series')
          if not isinstance(series, list) or len(series) == 0:
              print("  !! list thieu mang 'series' hop le - bo qua")
              sys.exit(1)

          # 2) Đọc registry cũ trong repo (nếu có) để giữ lại các field ID
          old_by_slug = {}
          if os.path.exists('series_registry.json'):
              try:
                  old = json.load(open('series_registry.json', encoding='utf-8'))
                  for s in old.get('series', []):
                      if s.get('slug'):
                          old_by_slug[s['slug']] = s
              except Exception as e:
                  print("  (registry cu khong doc duoc, bo qua merge ID):", e)

          # 3) Merge: ưu tiên dữ liệu mới; bổ sung ID từ bản cũ nếu list không có
          KEEP = ('wikiFolderId', 'readerJsonId', 'pdfFileId')
          for s in series:
              old = old_by_slug.get(s.get('slug'), {})
              for k in KEEP:
                  if not s.get(k) and old.get(k):
                      s[k] = old[k]

          json.dump({'series': series}, open('series_registry.json', 'w', encoding='utf-8'),
                    ensure_ascii=False, indent=2)
          print("  OK: series_registry.json da cap nhat (%d bo)" % len(series))
          PY
          echo "Đã tạo update_registry.py"

      - name: Cập nhật series_registry.json (tiến độ chương) từ ?action=list
        run: |
          echo "  Kéo ?action=list -> registry..."
          curl -sSL "${WIKI_SYNC_URL}?action=list" -o registry_remote.tmp || true
          if python3 update_registry.py; then
            echo "  registry cập nhật xong"
          else
            echo "  !! Giữ nguyên series_registry.json cũ"
          fi
          rm -f registry_remote.tmp update_registry.py
          echo "== Xong registry =="

      - name: Commit nếu có thay đổi
        run: |
          git config user.name "wiki-sync-bot"
          git config user.email "wiki-sync-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "Không có thay đổi — bỏ qua commit."
            exit 0
          fi
          git add -A
          git commit -m "Tự đồng bộ wiki + registry từ Drive ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          # Thử push, nếu bị từ chối thì rebase lên bản mới nhất rồi push lại (tối đa 5 lần)
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Đã push -> Cloudflare Pages sẽ tự deploy."
              exit 0
            fi
            echo "Push bị từ chối (lần $i) — đồng bộ với remote rồi thử lại..."
            git fetch origin main
            git rebase origin/main || git rebase --abort
          done
          echo "Không push được sau 5 lần thử."
          exit 1
